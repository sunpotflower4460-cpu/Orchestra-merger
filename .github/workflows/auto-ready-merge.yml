name: Auto-ready and auto-merge Copilot PRs

# Triggered after the CI Check workflow completes so that Copilot draft PRs can
# be promoted to ready-for-review and squash-merged automatically, removing the
# remaining manual bottleneck in the single-repo self-driving loop.
#
# Safety conditions (ALL must be true to proceed):
#   - workflow_run concluded success
#   - PR author matches shared Copilot identity policy
#   - PR targets main
#   - PR is not closed
#   - PR has changed files > 0
#   - PR title does not contain WIP
#   - PR body does not contain known placeholder text
#   - config/target-repos.yml entry for this repo has auto_merge: after_required_checks
#
# If any condition fails the workflow logs the reason and exits cleanly (fail closed).

on:
  workflow_run:
    workflows: ["CI Check"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to process (manual testing only)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-ready-merge:
    name: Auto-ready and auto-merge Copilot PR
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ORCHESTRA_PAT }}

    steps:
      # -----------------------------------------------------------------------
      # 0. Guard: secret must be present
      # -----------------------------------------------------------------------
      - name: Verify ORCHESTRA_PAT is set
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::ORCHESTRA_PAT is not set. Cannot proceed with auto-ready-merge."
            exit 1
          fi
          echo "ORCHESTRA_PAT is set."

      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Check that the triggering CI run actually succeeded
      # -----------------------------------------------------------------------
      - name: Check CI conclusion
        id: ci
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            conclusion="${{ github.event.workflow_run.conclusion }}"
            run_id="${{ github.event.workflow_run.id }}"
            # Event that triggered the upstream CI check run (for example pull_request).
            upstream_event="${{ github.event.workflow_run.event }}"
            trigger_type="workflow_run"
          else
            # workflow_dispatch: treat as success so the rest of the logic runs
            conclusion="success"
            run_id="manual"
            upstream_event="workflow_dispatch"
            trigger_type="workflow_dispatch"
          fi
          echo "trigger_type       : ${trigger_type}"
          echo "upstream_event     : ${upstream_event}"
          echo "workflow_run_id    : ${run_id}"
          echo "workflow_conclusion: ${conclusion}"
          echo "trigger_type=${trigger_type}" >> "${GITHUB_OUTPUT}"
          echo "upstream_event=${upstream_event}" >> "${GITHUB_OUTPUT}"
          echo "conclusion=${conclusion}" >> "${GITHUB_OUTPUT}"
          echo "workflow_run_id=${run_id}" >> "${GITHUB_OUTPUT}"

          if [ "${trigger_type}" = "workflow_run" ] && [ "${upstream_event}" != "pull_request" ]; then
            reason="upstream event is ${upstream_event} (expected pull_request)"
            echo "Decision: skipped: ${reason}"
            echo "should_continue=false" >> "${GITHUB_OUTPUT}"
            echo "skip_reason=${reason}" >> "${GITHUB_OUTPUT}"
          elif [ "${conclusion}" != "success" ]; then
            echo "Decision: skipped: not CI success (conclusion=${conclusion})"
            echo "should_continue=false" >> "${GITHUB_OUTPUT}"
            echo "skip_reason=not CI success (conclusion=${conclusion})" >> "${GITHUB_OUTPUT}"
          else
            echo "should_continue=true" >> "${GITHUB_OUTPUT}"
            echo "skip_reason=" >> "${GITHUB_OUTPUT}"
          fi

      # -----------------------------------------------------------------------
      # 2. Resolve the PR associated with the workflow run commit
      # -----------------------------------------------------------------------
      - name: Resolve PR from workflow run
        id: resolve_pr
        if: steps.ci.outputs.should_continue == 'true'
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          MANUAL_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Trigger: workflow_dispatch"
            raw_input="${MANUAL_PR_NUMBER}"
            echo "Raw input: [${raw_input}]"

            # Normalize various input forms to a bare numeric PR number:
            #   72           → 72
            #   #72          → 72
            #   PR owner/repo#72  → 72  (or any text ending with #NNN)
            #   pr_number=72 → 72
            #   pr_number = 72 → 72
            normalized="${raw_input}"

            if [[ "${normalized}" =~ ^[[:space:]]*pr_number[[:space:]]*=[[:space:]]*([0-9]+)[[:space:]]*$ ]]; then
              # pr_number=NNN or pr_number = NNN
              normalized="${BASH_REMATCH[1]}"
            elif [[ "${normalized}" =~ \#([0-9]+)[[:space:]]*$ ]]; then
              # Any text ending with #NNN (e.g. PR owner/repo#72 or #72)
              normalized="${BASH_REMATCH[1]}"
            else
              # Strip only leading '#' characters and surrounding whitespace (not internal)
              normalized=$(echo "${normalized}" | sed 's/^[[:space:]#]*//;s/[[:space:]]*$//')
            fi

            echo "Sanitized value: [${normalized}]"

            # Validate: must be non-empty and purely numeric before gh pr view runs
            if [ -z "${normalized}" ] || ! [[ "${normalized}" =~ ^[0-9]+$ ]]; then
              reason="invalid PR number (raw='${raw_input}', sanitized='${normalized}')"
              echo "Decision: skipped: ${reason}"
              echo "should_continue=false" >> "${GITHUB_OUTPUT}"
              echo "skip_reason=${reason}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            pr_number="${normalized}"
            resolve_method="manual_input"
            echo "Final PR number: ${pr_number}"
          else
            echo "Trigger: workflow_run"
            echo "HEAD SHA   : ${HEAD_SHA}"
            echo "Head branch: ${HEAD_BRANCH}"

            # Primary lookup: resolve PR via commit SHA
            pr_number=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/${{ github.repository }}/commits/${HEAD_SHA}/pulls" \
              --jq '.[0].number // empty' 2>/dev/null || true)

            if [ -n "${pr_number}" ]; then
              resolve_method="sha_lookup"
              echo "Resolved PR #${pr_number} via commits/{HEAD_SHA}/pulls (method: sha_lookup)"
            else
              echo "commits/{HEAD_SHA}/pulls returned empty — trying head branch fallback..."
              # Fallback: find an open PR whose head branch matches the workflow run branch
              if [ -n "${HEAD_BRANCH}" ]; then
                head_owner="${{ github.event.workflow_run.head_repository.owner.login }}"
                # Fall back to repository owner if head_repository owner is unavailable
                head_owner="${head_owner:-${{ github.repository_owner }}}"
                pr_number=$(gh api \
                  -H "Accept: application/vnd.github+json" \
                  "repos/${{ github.repository }}/pulls?state=open&head=${head_owner}:${HEAD_BRANCH}" \
                  --jq '.[0].number // empty' 2>/dev/null || true)
                if [ -n "${pr_number}" ]; then
                  resolve_method="head_branch_lookup"
                  echo "Resolved PR #${pr_number} via head branch ${HEAD_BRANCH} (method: head_branch_lookup)"
                fi
              fi
            fi

            if [ -z "${pr_number}" ]; then
              reason="no PR resolved for commit ${HEAD_SHA} or branch ${HEAD_BRANCH}"
              echo "Decision: skipped: ${reason}"
              echo "should_continue=false" >> "${GITHUB_OUTPUT}"
              echo "skip_reason=${reason}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          echo "pr_number=${pr_number}" >> "${GITHUB_OUTPUT}"
          echo "resolve_method=${resolve_method}" >> "${GITHUB_OUTPUT}"
          echo "should_continue=true" >> "${GITHUB_OUTPUT}"
          echo "skip_reason=" >> "${GITHUB_OUTPUT}"

      # -----------------------------------------------------------------------
      # 3. Load full PR details via GitHub API (not just event payload)
      # -----------------------------------------------------------------------
      - name: Load full PR details
        id: pr
        if: steps.resolve_pr.outputs.should_continue == 'true'
        env:
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
        run: |
          set -euo pipefail

          # Hard guard: pr_number must be purely numeric to avoid gh pr view
          # treating an invalid value as a branch name and producing a confusing error.
          if [ -z "${PR_NUMBER}" ] || ! [[ "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "::error::Error: invalid PR number (pr_number='${PR_NUMBER}'). This is a code bug — the resolve step should have caught this."
            exit 1
          fi

          pr_json=$(gh pr view "${PR_NUMBER}" --repo "${{ github.repository }}" \
            --json title,body,isDraft,author,state,baseRefName,changedFiles)

          changed_files=$(jq -r '.changedFiles // empty' <<< "${pr_json}")
          if [ -z "${changed_files}" ] || ! [[ "${changed_files}" =~ ^[0-9]+$ ]]; then
            echo "::warning::Unable to determine changedFiles for PR #${PR_NUMBER}; safety gate will skip with explicit reason."
            changed_files=""
          fi

          {
            echo "author_login=$(jq -r '.author.login // ""' <<< "${pr_json}")"
            echo "pr_state=$(jq -r '.state // ""' <<< "${pr_json}")"
            echo "pr_base=$(jq -r '.baseRefName // ""' <<< "${pr_json}")"
            echo "is_draft=$(jq -r '.isDraft' <<< "${pr_json}")"
            echo "changed_files=${changed_files}"
            echo "title<<EOF"
            jq -r '.title // ""' <<< "${pr_json}"
            echo "EOF"
            echo "body<<EOF"
            jq -r '.body // ""' <<< "${pr_json}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      # -----------------------------------------------------------------------
      # 4. Log all decision-relevant values (no secrets emitted)
      # -----------------------------------------------------------------------
      - name: Log PR info
        if: steps.resolve_pr.outputs.should_continue == 'true'
        env:
          PR_AUTHOR: ${{ steps.pr.outputs.author_login }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_DRAFT: ${{ steps.pr.outputs.is_draft }}
          PR_BASE: ${{ steps.pr.outputs.pr_base }}
          PR_CHANGED_FILES: ${{ steps.pr.outputs.changed_files }}
        run: |
          echo "=== Auto-ready-merge evaluation ==="
          echo "workflow_run_id     : ${{ steps.ci.outputs.workflow_run_id }}"
          echo "workflow_conclusion : ${{ steps.ci.outputs.conclusion }}"
          echo "PR number           : ${{ steps.resolve_pr.outputs.pr_number }}"
          echo "PR author login     : ${PR_AUTHOR}"
          echo "PR title            : ${PR_TITLE}"
          echo "PR draft            : ${PR_DRAFT}"
          echo "PR target branch    : ${PR_BASE}"
          echo "Changed file count  : ${PR_CHANGED_FILES}"

      # -----------------------------------------------------------------------
      # 5. Safety gate — skip unless every condition passes
      # -----------------------------------------------------------------------
      - name: Safety gate
        id: safety
        if: steps.resolve_pr.outputs.should_continue == 'true'
        env:
          PR_AUTHOR: ${{ steps.pr.outputs.author_login }}
          PR_STATE: ${{ steps.pr.outputs.pr_state }}
          PR_BASE: ${{ steps.pr.outputs.pr_base }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_BODY: ${{ steps.pr.outputs.body }}
          CHANGED_FILES: ${{ steps.pr.outputs.changed_files }}
        run: |
          set -euo pipefail

          skip=false
          reasons=()

          # Shared Copilot identity policy:
          # docs/config/copilot-identities.json + scripts/copilot-identity.mjs
          is_copilot="$(node scripts/copilot-identity.mjs is-copilot "${PR_AUTHOR}")"
          echo "author_is_copilot=${is_copilot}" >> "${GITHUB_OUTPUT}"
          if [ "${is_copilot}" != "true" ]; then
            skip=true
            reasons+=("not Copilot-authored (author=${PR_AUTHOR})")
          fi

          # Must target main
          if [ "${PR_BASE}" != "main" ]; then
            skip=true
            reasons+=("PR targets ${PR_BASE}, not main")
          fi

          # Must be open (not closed or merged)
          pr_state_upper=$(echo "${PR_STATE}" | tr '[:lower:]' '[:upper:]')
          if [ "${pr_state_upper}" != "OPEN" ]; then
            skip=true
            reasons+=("PR is not open (state=${PR_STATE})")
          fi

          # Title must not contain WIP
          if [[ "${PR_TITLE}" == *"WIP"* ]]; then
            skip=true
            reasons+=("WIP/placeholder (title contains WIP)")
          fi

          # Body must not contain known Copilot placeholder text
          if grep -qi "Thanks for asking me to work on this" <<< "${PR_BODY:-}"; then
            skip=true
            reasons+=("WIP/placeholder (body contains 'Thanks for asking me to work on this')")
          elif grep -qi "I will get started" <<< "${PR_BODY:-}"; then
            skip=true
            reasons+=("WIP/placeholder (body contains 'I will get started')")
          elif grep -qi "I will start working" <<< "${PR_BODY:-}"; then
            skip=true
            reasons+=("WIP/placeholder (body contains 'I will start working')")
          fi

          # Must have at least one changed file, and changed file count must be known.
          if [ -z "${CHANGED_FILES:-}" ]; then
            skip=true
            reasons+=("changed file count unavailable")
          elif ! [[ "${CHANGED_FILES}" =~ ^[0-9]+$ ]]; then
            skip=true
            reasons+=("changed file count unavailable")
          elif [ "${CHANGED_FILES}" -eq 0 ]; then
            skip=true
            reasons+=("no changed files")
          fi

          if [ "${skip}" = "true" ]; then
            if [ "${#reasons[@]}" -gt 0 ]; then
              skip_reason=$(IFS=', '; echo "${reasons[*]}")
            else
              skip_reason="safety gate failed (reason unavailable)"
            fi
            echo "Decision: skipped: ${skip_reason}"
            echo "should_continue=false" >> "${GITHUB_OUTPUT}"
            echo "skip_reason=${skip_reason}" >> "${GITHUB_OUTPUT}"
          else
            echo "All safety conditions passed."
            echo "should_continue=true" >> "${GITHUB_OUTPUT}"
            echo "skip_reason=" >> "${GITHUB_OUTPUT}"
          fi

      # -----------------------------------------------------------------------
      # 6. Validate target-repo policy — only after_required_checks may proceed
      # -----------------------------------------------------------------------
      - name: Check target repo policy
        id: policy
        if: steps.safety.outputs.should_continue == 'true'
        run: |
          set -euo pipefail

          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          # Parse config/target-repos.yml (same simple format as validate-target-repo.mjs)
          policy=""
          in_target=false
          while IFS= read -r line; do
            # Detect the start of a target entry
            if [[ "${line}" =~ ^[[:space:]]*-[[:space:]]+repo:[[:space:]]*(.*) ]]; then
              entry_repo="${BASH_REMATCH[1]}"
              entry_repo_lower=$(echo "${entry_repo}" | tr '[:upper:]' '[:lower:]')
              if [ "${entry_repo_lower}" = "${repo_lower}" ]; then
                in_target=true
              else
                in_target=false
              fi
              continue
            fi
            if [ "${in_target}" = "true" ]; then
              # Extract auto_merge value
              if [[ "${line}" =~ ^[[:space:]]+auto_merge:[[:space:]]*(.*) ]]; then
                policy="${BASH_REMATCH[1]}"
                break
              fi
              # A new list item means we left our block without finding auto_merge
              if [[ "${line}" =~ ^[[:space:]]*-[[:space:]] ]]; then
                break
              fi
            fi
          done < "config/target-repos.yml"

          if [ -z "${policy}" ]; then
            policy="not_found"
          fi

          echo "target_repo_policy  : ${policy}"
          echo "target_repo_policy=${policy}" >> "${GITHUB_OUTPUT}"

          if [ "${policy}" = "after_required_checks" ]; then
            echo "Policy allows auto-merge."
            echo "should_continue=true" >> "${GITHUB_OUTPUT}"
            echo "skip_reason=" >> "${GITHUB_OUTPUT}"
          else
            reason="policy not auto-merge (policy=${policy})"
            echo "Decision: skipped: ${reason}"
            echo "should_continue=false" >> "${GITHUB_OUTPUT}"
            echo "skip_reason=${reason}" >> "${GITHUB_OUTPUT}"
          fi

      # -----------------------------------------------------------------------
      # 7. Decide and execute Ready transition (if applicable)
      # -----------------------------------------------------------------------
      - name: Decide Ready transition
        id: ready
        if: steps.policy.outputs.should_continue == 'true'
        env:
          PR_DRAFT: ${{ steps.pr.outputs.is_draft }}
        run: |
          set -euo pipefail
          if [ "${PR_DRAFT}" = "true" ]; then
            echo "Ready decision: attempt transition (draft=true)."
            echo "attempt_ready=true" >> "${GITHUB_OUTPUT}"
            echo "ready_reason=draft PR detected" >> "${GITHUB_OUTPUT}"
          else
            echo "Ready decision: skip transition (draft=false)."
            echo "attempt_ready=false" >> "${GITHUB_OUTPUT}"
            echo "ready_reason=PR already ready (draft=false)" >> "${GITHUB_OUTPUT}"
          fi

      - name: Mark PR ready for review
        id: mark_ready
        if: >
          steps.policy.outputs.should_continue == 'true' &&
          steps.ready.outputs.attempt_ready == 'true'
        env:
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          echo "Marking PR #${PR_NUMBER} as ready for review..."
          gh pr ready "${PR_NUMBER}" --repo "${{ github.repository }}"
          echo "Decision: marked ready"
          echo "marked_ready=true" >> "${GITHUB_OUTPUT}"

      # -----------------------------------------------------------------------
      # 8. Enable auto-merge with squash strategy
      # -----------------------------------------------------------------------
      - name: Enable auto-merge (squash)
        if: steps.policy.outputs.should_continue == 'true'
        env:
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          echo "Enabling auto-merge (squash) for PR #${PR_NUMBER}..."
          MERGE_OUTPUT=$(gh pr merge "${PR_NUMBER}" \
            --repo "${{ github.repository }}" \
            --auto \
            --squash 2>&1) || EXIT_CODE=$?
          EXIT_CODE=${EXIT_CODE:-0}
          if [ "${EXIT_CODE}" -eq 0 ]; then
            echo "Decision: squash merge requested"
            echo "Auto-merge enabled for PR #${PR_NUMBER}."
          elif echo "${MERGE_OUTPUT}" | grep -qi "already"; then
            echo "Decision: squash merge requested (already enabled)"
            echo "Auto-merge was already enabled for PR #${PR_NUMBER}."
          else
            echo "::error::Failed to enable auto-merge for PR #${PR_NUMBER}: ${MERGE_OUTPUT}"
            exit "${EXIT_CODE}"
          fi

      # -----------------------------------------------------------------------
      # 9. Workflow summary (always)
      # -----------------------------------------------------------------------
      - name: Write workflow summary
        if: always()
        env:
          TRIGGER_TYPE: ${{ steps.ci.outputs.trigger_type }}
          UPSTREAM_EVENT: ${{ steps.ci.outputs.upstream_event }}
          CI_CONCLUSION: ${{ steps.ci.outputs.conclusion }}
          WORKFLOW_RUN_ID: ${{ steps.ci.outputs.workflow_run_id }}
          CI_SKIP_REASON: ${{ steps.ci.outputs.skip_reason }}
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
          RESOLVE_METHOD: ${{ steps.resolve_pr.outputs.resolve_method }}
          RESOLVE_SKIP_REASON: ${{ steps.resolve_pr.outputs.skip_reason }}
          PR_AUTHOR: ${{ steps.pr.outputs.author_login }}
          PR_DRAFT: ${{ steps.pr.outputs.is_draft }}
          AUTHOR_IS_COPILOT: ${{ steps.safety.outputs.author_is_copilot }}
          SAFETY_SKIP_REASON: ${{ steps.safety.outputs.skip_reason }}
          TARGET_REPO_POLICY: ${{ steps.policy.outputs.target_repo_policy }}
          POLICY_SKIP_REASON: ${{ steps.policy.outputs.skip_reason }}
          ATTEMPT_READY: ${{ steps.ready.outputs.attempt_ready }}
          READY_REASON: ${{ steps.ready.outputs.ready_reason }}
          MARKED_READY: ${{ steps.mark_ready.outputs.marked_ready }}
        run: |
          set -euo pipefail
          overall_reason="${CI_SKIP_REASON}"
          if [ -z "${overall_reason}" ] && [ -n "${RESOLVE_SKIP_REASON}" ]; then
            overall_reason="${RESOLVE_SKIP_REASON}"
          fi
          if [ -z "${overall_reason}" ] && [ -n "${SAFETY_SKIP_REASON}" ]; then
            overall_reason="${SAFETY_SKIP_REASON}"
          fi
          if [ -z "${overall_reason}" ] && [ -n "${POLICY_SKIP_REASON}" ]; then
            overall_reason="${POLICY_SKIP_REASON}"
          fi
          if [ -z "${overall_reason}" ]; then
            overall_reason="none"
          fi

          ready_outcome="not evaluated"
          if [ "${ATTEMPT_READY}" = "true" ]; then
            if [ "${MARKED_READY}" = "true" ]; then
              ready_outcome="attempted: marked ready"
            elif [ -z "${MARKED_READY}" ]; then
              ready_outcome="attempted: mark_ready step did not complete (check step logs for errors)"
            else
              ready_outcome="attempted: marked_ready=${MARKED_READY}"
            fi
          elif [ "${ATTEMPT_READY}" = "false" ]; then
            ready_outcome="skipped: ${READY_REASON}"
          elif [ -z "${ATTEMPT_READY}" ]; then
            ready_outcome="not evaluated (policy gate failed or earlier skip)"
          fi

          {
            echo "### Auto-ready-merge decision summary"
            echo ""
            echo "- trigger type: ${TRIGGER_TYPE}"
            echo "- upstream event: ${UPSTREAM_EVENT}"
            echo "- CI conclusion: ${CI_CONCLUSION}"
            echo "- workflow_run id: ${WORKFLOW_RUN_ID}"
            echo "- resolved PR number: ${PR_NUMBER:-none}"
            echo "- PR resolve method: ${RESOLVE_METHOD:-none}"
            echo "- author login: ${PR_AUTHOR:-unknown}"
            echo "- author is Copilot: ${AUTHOR_IS_COPILOT:-unknown}"
            echo "- PR draft state: ${PR_DRAFT:-unknown}"
            echo "- target repo policy decision: ${TARGET_REPO_POLICY:-not_evaluated}"
            echo "- Ready transition: ${ready_outcome}"
            echo "- skip reason: ${overall_reason}"
          } >> "${GITHUB_STEP_SUMMARY}"
