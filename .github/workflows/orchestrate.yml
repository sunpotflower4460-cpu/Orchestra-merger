name: Orchestrate Next Copilot Issue

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

concurrency:
  group: orchestra-merger-orchestrate
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  orchestrate:
    name: Pick queued issue and assign Copilot
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    env:
      GH_TOKEN: ${{ secrets.ORCHESTRA_PAT }}
      COPILOT_AGENT_LOGIN: copilot-swe-agent[bot]
      COPILOT_TARGET_REPO: sunpotflower4460-cpu/Orchestra-merger
      COPILOT_BASE_BRANCH: main

    steps:
      - name: Verify ORCHESTRA_PAT is set
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::ORCHESTRA_PAT is not set. Cannot orchestrate queued issues."
            exit 1
          fi
          echo "ORCHESTRA_PAT is set."

      - name: Show trigger reason
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Trigger reason: manual dispatch"
          else
            echo "Trigger reason: PR merged"
            echo "Merged PR: #${{ github.event.pull_request.number }}"
          fi

      - name: Finalize linked issue from merged PR
        if: github.event_name == 'pull_request'
        env:
          MERGED_PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
          PR_HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Intentionally omit `-e` so warnings do not block queue advancement.
          set -uo pipefail

          echo "Merged PR number: #${MERGED_PR_NUMBER}"
          echo "PR author login: ${PR_AUTHOR_LOGIN}"
          echo "PR head branch: ${PR_HEAD_BRANCH}"

          repo_slug_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          candidate_numbers=()

          # Primary resolution: GitHub-native closing-issue linkage on the merged PR.
          # Copilot-created PRs are linked to their originating issue, so this is the most
          # reliable signal and does not depend on PR body wording or branch naming.
          owner="${GITHUB_REPOSITORY%/*}"
          repo_name="${GITHUB_REPOSITORY#*/}"
          graphql_linked="$(gh api graphql \
            -f query='query($owner:String!,$repo:String!,$pr:Int!){repository(owner:$owner,name:$repo){pullRequest(number:$pr){closingIssuesReferences(first:20){nodes{number}}}}}' \
            -F owner="${owner}" -F repo="${repo_name}" -F pr="${MERGED_PR_NUMBER}" \
            --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' 2>/dev/null || true)"
          if [ -n "${graphql_linked}" ]; then
            echo "Found native closing-issue linkage for PR #${MERGED_PR_NUMBER}:"
            echo "${graphql_linked}"
            while IFS= read -r linked_num; do
              [ -n "${linked_num}" ] && candidate_numbers+=("${linked_num}")
            done <<< "${graphql_linked}"
          fi

          body_matches="$(printf '%s\n' "${PR_BODY:-}" | grep -Eio '(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)([[:space:]]+|[[:space:]]*:[[:space:]]*|)([[:alnum:]_.-]+/[[:alnum:]_.-]+)?#([0-9]+)' || true)"
          if [ -n "${body_matches}" ]; then
            echo "Found potential linked issues in PR body:"
            echo "${body_matches}"
            while IFS= read -r match; do
              [ -n "${match}" ] || continue
              if [[ "${match}" =~ ([[:space:]]+|[[:space:]]*:[[:space:]]*|)([[:alnum:]_.-]+/[[:alnum:]_.-]+)?#([0-9]+)$ ]]; then
                linked_repo="${BASH_REMATCH[2]}"
                linked_issue="${BASH_REMATCH[3]}"
                linked_repo_lc="$(echo "${linked_repo}" | tr '[:upper:]' '[:lower:]')"
                if [ -n "${linked_repo}" ] && [ "${linked_repo_lc}" != "${repo_slug_lc}" ]; then
                  echo "::warning::Skipping cross-repo linked issue reference: ${linked_repo}#${linked_issue}"
                  continue
                fi
                candidate_numbers+=("${linked_issue}")
              fi
            done <<< "${body_matches}"
          fi

          if [ "${#candidate_numbers[@]}" -eq 0 ]; then
            if [[ "${PR_HEAD_BRANCH}" =~ (^|[-_/])issue-([0-9]+)($|[-_/]) ]]; then
              candidate_numbers+=("${BASH_REMATCH[2]}")
              echo "No PR body link found. Using branch issue candidate: #${BASH_REMATCH[2]}"
            fi
          fi

          if [ "${#candidate_numbers[@]}" -eq 0 ]; then
            echo "No PR body or branch issue match found. Falling back to Copilot-assigned open issues (in-progress or queued)."
            # Include `queued` as well as `in-progress`: an issue started via the GitHub UI
            # ("Assign to Copilot") may never have transitioned to in-progress. Restrict to
            # issues assigned to the Copilot agent so unrelated issues are never closed.
            fb_copilot_logins='["Copilot","copilot-swe-agent","copilot-swe-agent[bot]","app/copilot-swe-agent"]'
            fb_assigned_filter='[(.assignees // [])[].login] | any(. as $a | $c | index($a))'
            fb_json="$( {
                gh api --method GET --paginate -H 'Accept: application/vnd.github+json' \
                  "/repos/${GITHUB_REPOSITORY}/issues?state=open&labels=in-progress&per_page=100" --jq '.[]'
                gh api --method GET --paginate -H 'Accept: application/vnd.github+json' \
                  "/repos/${GITHUB_REPOSITORY}/issues?state=open&labels=queued&per_page=100" --jq '.[]'
              } 2>/dev/null | jq -s '.' || true)"
            if [ -n "${fb_json}" ]; then
              mapfile -t fb_numbers < <(jq -r --argjson c "${fb_copilot_logins}" \
                ".[] | select(.pull_request == null) | select(${fb_assigned_filter}) | .number" <<< "${fb_json}" | sort -n | uniq)
              if [ "${#fb_numbers[@]}" -eq 1 ]; then
                candidate_numbers+=("${fb_numbers[0]}")
                echo "Fallback selected the only Copilot-assigned open issue: #${fb_numbers[0]}"
              elif [ "${#fb_numbers[@]}" -eq 0 ]; then
                echo "::warning::No Copilot-assigned open issue found for fallback resolution."
              else
                echo "::warning::Multiple Copilot-assigned open issues found (${#fb_numbers[@]}). Not guessing."
              fi
            else
              echo "::warning::Failed to query open issues for fallback resolution."
            fi
          fi

          if [ "${#candidate_numbers[@]}" -eq 0 ]; then
            echo "Candidate linked issue numbers: (none)"
            echo "::warning::No safe linked issue candidate could be resolved from merged PR #${MERGED_PR_NUMBER}."
            exit 0
          fi

          mapfile -t unique_candidates < <(printf '%s\n' "${candidate_numbers[@]}" | sed '/^$/d' | sort -n | uniq)
          echo "Candidate linked issue numbers: ${unique_candidates[*]}"

          final_numbers=()
          for issue_number in "${unique_candidates[@]}"; do
            issue_json="$(gh api --method GET \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${GITHUB_REPOSITORY}/issues/${issue_number}" 2>/dev/null || true)"
            if [ -z "${issue_json}" ]; then
              echo "::warning::Unable to load candidate issue #${issue_number}. Skipping."
              continue
            fi

            if jq -e '.pull_request != null' >/dev/null <<< "${issue_json}"; then
              echo "::warning::Candidate #${issue_number} is a pull request object. Skipping."
              continue
            fi

            issue_state="$(jq -r '.state' <<< "${issue_json}")"
            if [ "${issue_state}" != "open" ]; then
              echo "::warning::Candidate issue #${issue_number} is not open (state=${issue_state}). Skipping."
              continue
            fi

            final_numbers+=("${issue_number}")
          done

          if [ "${#final_numbers[@]}" -eq 0 ]; then
            echo "Final issue numbers selected for cleanup: (none)"
            echo "::warning::No safe linked issue remained after validation for merged PR #${MERGED_PR_NUMBER}."
            exit 0
          fi

          echo "Final issue numbers selected for cleanup: ${final_numbers[*]}"
          for issue_number in "${final_numbers[@]}"; do
            # Completion policy: remove `in-progress` and close the linked issue as completed.
            in_progress_removed="false"
            issue_closed="false"

            if gh issue edit "${issue_number}" --repo "${GITHUB_REPOSITORY}" --remove-label "in-progress" >/dev/null 2>&1; then
              in_progress_removed="true"
            else
              echo "::warning::Failed to remove 'in-progress' from issue #${issue_number}."
            fi

            if gh issue close "${issue_number}" --repo "${GITHUB_REPOSITORY}" --comment "Closing because this issue is linked to merged PR #${MERGED_PR_NUMBER}." >/dev/null 2>&1; then
              issue_closed="true"
            else
              echo "::warning::Failed to close linked issue #${issue_number}."
            fi

            echo "Issue #${issue_number}: in-progress removed=${in_progress_removed}, closed=${issue_closed}"
          done

      - name: Find next queued issue
        id: pick
        run: |
          set -euo pipefail

          issues_json="$(gh api --method GET \
            --paginate \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/issues?state=open&labels=queued&per_page=100" \
            --jq '.[]' | jq -s '.')"

          # Real issues only (the issues endpoint also returns PRs).
          queued_json="$(jq '[.[] | select(.pull_request | not)]' <<<"${issues_json}")"
          queued_count="$(jq 'length' <<<"${queued_json}")"
          echo "Queued issue count: ${queued_count}"

          if [ "${queued_count}" -eq 0 ]; then
            echo "No queued issues. Nothing to do."
            echo "has_issue=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Reconcile drift: a queued issue already assigned to the Copilot agent was
          # started outside this orchestrate/PWA path (e.g. GitHub UI "Assign to Copilot"),
          # so it never transitioned queued -> in-progress. Move it to in-progress and
          # exclude it from selection so Copilot is not assigned to it a second time.
          copilot_logins='["Copilot","copilot-swe-agent","copilot-swe-agent[bot]","app/copilot-swe-agent"]'
          assigned_filter='[(.assignees // [])[].login] | any(. as $a | $c | index($a))'

          mapfile -t already_assigned < <(jq -r --argjson c "${copilot_logins}" \
            ".[] | select(${assigned_filter}) | .number" <<<"${queued_json}")
          for an in "${already_assigned[@]}"; do
            [ -n "${an}" ] || continue
            echo "Issue #${an} is queued but already assigned to Copilot. Reconciling queued -> in-progress."
            if gh issue edit "${an}" --repo "${GITHUB_REPOSITORY}" --add-label "in-progress" >/dev/null 2>&1; then
              echo "  added in-progress to #${an}"
            else
              echo "::warning::Failed to add in-progress to #${an}"
            fi
            if gh issue edit "${an}" --repo "${GITHUB_REPOSITORY}" --remove-label "queued" >/dev/null 2>&1; then
              echo "  removed queued from #${an}"
            else
              echo "::warning::Failed to remove queued from #${an}"
            fi
          done

          # Selectable = queued issues NOT already assigned to Copilot.
          selectable_json="$(jq --argjson c "${copilot_logins}" \
            "[.[] | select((${assigned_filter}) | not)]" <<<"${queued_json}")"
          selectable_count="$(jq 'length' <<<"${selectable_json}")"

          if [ "${selectable_count}" -eq 0 ]; then
            echo "All queued issues are already assigned to Copilot. Nothing new to assign."
            echo "has_issue=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          selected="$(jq 'sort_by(.number) | .[0]' <<<"${selectable_json}")"
          issue_number="$(jq -r '.number' <<<"${selected}")"
          issue_title="$(jq -r '.title' <<<"${selected}")"
          issue_url="$(jq -r '.html_url' <<<"${selected}")"

          echo "Selected issue: #${issue_number} ${issue_title}"
          echo "Issue URL: ${issue_url}"

          {
            echo "has_issue=true"
            echo "queued_count=${selectable_count}"
            echo "issue_number=${issue_number}"
            echo "issue_url=${issue_url}"
            echo "issue_title<<EOF"
            echo "${issue_title}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Add in-progress label
        id: add_in_progress
        if: steps.pick.outputs.has_issue == 'true'
        run: |
          set -euo pipefail
          issue_number="${{ steps.pick.outputs.issue_number }}"
          issue_title="${{ steps.pick.outputs.issue_title }}"

          echo "Adding label 'in-progress' to issue #${issue_number}..."
          if gh issue edit "${issue_number}" --repo "${GITHUB_REPOSITORY}" --add-label "in-progress"; then
            echo "Added in-progress to issue #${issue_number} (${issue_title})"
          else
            echo "::error::Failed to add 'in-progress' label to #${issue_number} (${issue_title}). Stopping before Copilot assignment."
            exit 1
          fi

      - name: Assign issue to Copilot coding agent
        id: assign
        if: steps.pick.outputs.has_issue == 'true' && steps.add_in_progress.outcome == 'success'
        env:
          ISSUE_NUMBER: ${{ steps.pick.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.pick.outputs.issue_title }}
        run: |
          set -euo pipefail

          echo "Assigning issue #${ISSUE_NUMBER} (${ISSUE_TITLE}) to ${COPILOT_AGENT_LOGIN}..."

          set +e
          response="$(gh api --method POST \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/assignees" \
            -f "assignees[]=${COPILOT_AGENT_LOGIN}" \
            -f "agent_assignment[target_repo]=${COPILOT_TARGET_REPO}" \
            -f "agent_assignment[base_branch]=${COPILOT_BASE_BRANCH}" \
            -f "agent_assignment[custom_instructions]=When you open the pull request for this task, include the line \"Closes #${ISSUE_NUMBER}\" in the PR description so this issue is linked and closed automatically on merge." \
            -f "agent_assignment[custom_agent]=" \
            -f "agent_assignment[model]=" 2>&1)"
          status=$?
          set -e

          if [ "${status}" -eq 0 ]; then
            echo "Assigned issue #${ISSUE_NUMBER} to Copilot"
          else
            echo "::error::Assignment failed for issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
            echo "::error::GitHub API response body: ${response}"

            # Rollback: remove in-progress so the issue stays recoverable.
            echo "Rollback: removing in-progress from issue #${ISSUE_NUMBER}..."
            if gh issue edit "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" --remove-label "in-progress" >/dev/null 2>&1; then
              echo "Rollback: removed in-progress from issue #${ISSUE_NUMBER}"
            else
              echo "::warning::Rollback: failed to remove in-progress from issue #${ISSUE_NUMBER}"
            fi

            # queued was not removed so the issue remains in the queue.
            echo "Rollback: queued remains on issue #${ISSUE_NUMBER} (was not removed)"

            # Rollback: add failed-assignment so the failure is visible.
            echo "Rollback: adding failed-assignment to issue #${ISSUE_NUMBER}..."
            if gh issue edit "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" --add-label "failed-assignment" >/dev/null 2>&1; then
              echo "Rollback: added failed-assignment to issue #${ISSUE_NUMBER}"
            else
              echo "::warning::Rollback: failed to add failed-assignment to issue #${ISSUE_NUMBER} — create the label manually if it does not exist"
            fi

            exit "${status}"
          fi

      - name: Remove queued label
        if: steps.pick.outputs.has_issue == 'true' && steps.assign.outcome == 'success'
        run: |
          set -euo pipefail
          issue_number="${{ steps.pick.outputs.issue_number }}"
          issue_title="${{ steps.pick.outputs.issue_title }}"

          echo "Removing label 'queued' from issue #${issue_number}..."
          if gh issue edit "${issue_number}" --repo "${GITHUB_REPOSITORY}" --remove-label "queued"; then
            echo "Removed queued from issue #${issue_number} (${issue_title})"
          else
            echo "::warning::Failed to remove 'queued' label from #${issue_number} (${issue_title}). The issue may be re-picked on next run. Remove the queued label manually to prevent re-picking."
          fi
