name: Copilot Auto Merge (Fallback)

# Primary owner of Copilot PR ready + auto-merge is auto-ready-merge.yml (CI-gated).
# This workflow is kept only as a manual fallback to re-enable auto-merge for a PR.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to process (manual fallback only)'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Evaluate and enable auto-merge for Copilot PR (fallback)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      GH_TOKEN: ${{ secrets.ORCHESTRA_PAT }}

    steps:
      - name: Verify ORCHESTRA_PAT is set
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::ORCHESTRA_PAT is not set. Cannot proceed with auto-merge."
            exit 1
          fi
          echo "ORCHESTRA_PAT is set."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch current PR state
        id: pr
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          pr_json=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json title,body,isDraft,author)
          changed_files=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename' | awk 'END { print NR }')

          {
            echo "title<<EOF"
            jq -r '.title' <<< "${pr_json}"
            echo "EOF"
            echo "body<<EOF"
            jq -r '.body // ""' <<< "${pr_json}"
            echo "EOF"
            echo "is_draft=$(jq -r '.isDraft' <<< "${pr_json}")"
            echo "author_login=$(jq -r '.author.login // ""' <<< "${pr_json}")"
            echo "changed_files=${changed_files}"
          } >> "${GITHUB_OUTPUT}"

      - name: Show PR info
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_DRAFT: ${{ steps.pr.outputs.is_draft }}
          PR_CHANGED_FILES: ${{ steps.pr.outputs.changed_files }}
          PR_AUTHOR_LOGIN: ${{ steps.pr.outputs.author_login }}
        run: |
          echo "PR number       : ${PR_NUMBER}"
          echo "PR author login : ${PR_AUTHOR_LOGIN}"
          echo "PR title        : ${PR_TITLE}"
          echo "PR draft        : ${PR_DRAFT}"
          echo "Changed files   : ${PR_CHANGED_FILES}"

      - name: Check Copilot author policy
        id: author_policy
        env:
          PR_AUTHOR_LOGIN: ${{ steps.pr.outputs.author_login }}
        run: |
          set -euo pipefail
          # Shared Copilot identity policy:
          # docs/config/copilot-identities.json + scripts/copilot-identity.mjs
          is_copilot="$(node scripts/copilot-identity.mjs is-copilot "${PR_AUTHOR_LOGIN}")"
          if [ "${is_copilot}" = "true" ]; then
            echo "PR author matches Copilot policy."
            echo "should_merge=true" >> "${GITHUB_OUTPUT}"
          else
            echo "Skipping auto-merge setup: PR author is not Copilot (${PR_AUTHOR_LOGIN})"
            echo "should_merge=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip unsafe early PR states
        id: safety
        if: steps.author_policy.outputs.should_merge == 'true'
        env:
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_BODY: ${{ steps.pr.outputs.body }}
          PR_DRAFT: ${{ steps.pr.outputs.is_draft }}
          CHANGED_FILES: ${{ steps.pr.outputs.changed_files }}
        run: |
          set -euo pipefail

          reasons=()

          if [ "${PR_DRAFT}" = "true" ]; then
            reasons+=("PR is draft")
          fi

          if [[ "${PR_TITLE}" == \[WIP\]* ]] || [[ "${PR_TITLE}" == WIP* ]]; then
            reasons+=("PR is WIP")
          fi

          if [ "${CHANGED_FILES:-0}" -eq 0 ]; then
            reasons+=("PR has zero changed files")
          fi

          if grep -qi "Thanks for asking me to work on this\. I will get started" <<< "${PR_BODY:-}"; then
            reasons+=("PR body still contains Copilot placeholder text")
          fi

          if [ "${#reasons[@]}" -gt 0 ]; then
            for reason in "${reasons[@]}"; do
              echo "Skipping auto-merge setup: ${reason}"
            done
            echo "should_merge=false" >> "${GITHUB_OUTPUT}"
          else
            echo "PR passed auto-merge safety gate."
            echo "should_merge=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Enable auto-merge (squash)
        if: steps.safety.outputs.should_merge == 'true'
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          echo "Enabling auto-merge (squash) for PR #${PR_NUMBER}..."
          MERGE_OUTPUT=$(gh pr merge "${PR_NUMBER}" \
            --repo "${{ github.repository }}" \
            --auto \
            --squash 2>&1)
          EXIT_CODE=$?
          if [ ${EXIT_CODE} -eq 0 ]; then
            echo "Auto-merge enabled successfully."
          elif echo "${MERGE_OUTPUT}" | grep -qi "already"; then
            echo "Auto-merge was already enabled for this PR."
          else
            echo "::error::Failed to enable auto-merge. Output: ${MERGE_OUTPUT}"
            exit ${EXIT_CODE}
          fi