name: Copilot Auto Merge

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize, edited]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Enable auto-merge for Copilot PR
    runs-on: ubuntu-latest
    # Copilot-authored PRs have been observed as `Copilot` in pull_request.user.login.
    # Keep `copilot-swe-agent[bot]` as a fallback for possible GitHub identity changes.
    # Human-authored PRs must not trigger this auto-merge job.
    if: >
      github.event_name == 'pull_request' &&
      (
        github.event.pull_request.user.login == 'Copilot' ||
        github.event.pull_request.user.login == 'copilot-swe-agent[bot]'
      )
    env:
      GH_TOKEN: ${{ secrets.ORCHESTRA_PAT }}

    steps:
      - name: Verify ORCHESTRA_PAT is set
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::ORCHESTRA_PAT is not set. Cannot proceed with auto-merge."
            exit 1
          fi
          echo "ORCHESTRA_PAT is set."

      - name: Show PR info
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR number       : ${{ github.event.pull_request.number }}"
          echo "PR author login : ${{ github.event.pull_request.user.login }}"
          echo "PR title        : ${PR_TITLE}"
          echo "PR draft        : ${{ github.event.pull_request.draft }}"
          echo "Changed files   : ${{ github.event.pull_request.changed_files }}"

      - name: Skip unsafe early PR states
        id: safety
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
        run: |
          set -euo pipefail

          should_skip=false
          reason=""

          if [ "${PR_DRAFT}" = "true" ]; then
            should_skip=true
            reason="PR is still draft."
          elif [[ "${PR_TITLE}" == \[WIP\]* ]] || [[ "${PR_TITLE}" == WIP* ]]; then
            should_skip=true
            reason="PR title is WIP."
          elif [ "${CHANGED_FILES:-0}" -eq 0 ]; then
            should_skip=true
            reason="PR has zero changed files."
          elif grep -qi "Thanks for asking me to work on this\. I will get started" <<< "${PR_BODY:-}"; then
            should_skip=true
            reason="PR body still contains Copilot's initial placeholder text."
          fi

          if [ "${should_skip}" = "true" ]; then
            echo "Skipping auto-merge setup: ${reason}"
            echo "should_merge=false" >> "${GITHUB_OUTPUT}"
          else
            echo "PR passed auto-merge safety gate."
            echo "should_merge=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Enable auto-merge (squash)
        if: steps.safety.outputs.should_merge == 'true'
        run: |
          echo "Enabling auto-merge (squash) for PR #${{ github.event.pull_request.number }}..."
          MERGE_OUTPUT=$(gh pr merge ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --auto \
            --squash 2>&1)
          EXIT_CODE=$?
          if [ ${EXIT_CODE} -eq 0 ]; then
            echo "Auto-merge enabled successfully."
          elif echo "${MERGE_OUTPUT}" | grep -qi "already"; then
            echo "Auto-merge was already enabled for this PR."
          else
            echo "::error::Failed to enable auto-merge. Output: ${MERGE_OUTPUT}"
            exit ${EXIT_CODE}
          fi